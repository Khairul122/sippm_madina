name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite, gd, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run test suite
        run: php artisan test

  deploy:
    name: Deploy via FTP
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy start summary
        run: |
          {
            echo "### 🚀 Deploy dimulai"
            echo ""
            echo "| Info | Nilai |"
            echo "|---|---|"
            echo "| Commit | \`${GITHUB_SHA:0:7}\` — $(git log -1 --pretty=%s) |"
            echo "| Branch | \`${GITHUB_REF_NAME}\` |"
            echo "| Trigger oleh | ${GITHUB_ACTOR} |"
            echo "| Waktu (UTC) | $(date -u '+%Y-%m-%d %H:%M:%S') |"
            echo "| Target server | \`${{ secrets.FTP_SERVER }}:21\` |"
            echo "| Target folder (app inti) | \`/laravel_app/\` |"
            echo "| Target folder (isi public/) | \`/public_html/\` |"
            echo "| vendor/ dan node_modules/ | di-deploy manual, tidak lewat CI |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy app core (outside public_html) via FTP
        id: ftp_deploy_core
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          server-dir: /laravel_app/
          log-level: verbose
          state-name: .ftp-deploy-sync-state-core.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.github/**
            **/public/**
            **/vendor/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/logs/**
            **/.env

      - name: Ensure required storage/cache directories exist on server
        run: |
          # storage/framework/{cache,sessions,views} dan storage/logs sengaja
          # di-exclude dari step di atas (supaya file session/cache/log yang
          # sedang dipakai server tidak tertimpa/terhapus tiap deploy) — tapi
          # exclude glob "**/storage/framework/cache/**" juga mencocokkan file
          # ".gitignore" placeholder yang biasanya membuat folder ini otomatis
          # ada. Akibatnya folder-folder ini tidak pernah tercipta di server
          # sama sekali sejak deploy pertama, dan Laravel butuh folder ini bisa
          # ditulis di SETIAP request (session/view cache/log) — kalau tidak
          # ada, Laravel crash sebelum sempat merender apa pun -> HTTP 500.
          # curl --ftp-create-dirs membuat seluruh path folder kalau belum ada,
          # dan tidak error kalau folder itu sudah ada (aman dijalankan tiap deploy).
          ensure_dir() {
            curl --silent --show-error --ftp-create-dirs \
              -T /dev/null \
              "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}/laravel_app/$1/.keep"
          }
          ensure_dir "storage/framework/cache/data"
          ensure_dir "storage/framework/sessions"
          ensure_dir "storage/framework/views"
          ensure_dir "storage/logs"
          ensure_dir "bootstrap/cache"

      - name: Deploy public assets (public/) to public_html via FTP
        id: ftp_deploy_public
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./public/
          server-dir: /public_html/
          log-level: verbose
          state-name: .ftp-deploy-sync-state-public.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            index.php

      - name: Deploy result summary
        if: always()
        run: |
          {
            echo ""
            echo "### 📦 Hasil deploy"
            echo ""
            if [ "${{ steps.ftp_deploy_core.outcome }}" = "success" ] && [ "${{ steps.ftp_deploy_public.outcome }}" = "success" ]; then
              echo "✅ Berhasil di-deploy ke \`${{ secrets.FTP_SERVER }}\`"
            else
              echo "❌ Deploy gagal — cek log step \"Deploy app core\" / \"Deploy public assets\" di atas untuk detail error FTP."
            fi
            echo ""
            echo "**App core (/laravel_app/)**"
            echo ""
            echo "| Metrik | Jumlah |"
            echo "|---|---|"
            echo "| File diunggah | ${{ steps.ftp_deploy_core.outputs.total-files-uploaded }} |"
            echo "| File dihapus | ${{ steps.ftp_deploy_core.outputs.total-files-deleted }} |"
            echo "| File dilewati (tidak berubah) | ${{ steps.ftp_deploy_core.outputs.total-files-skipped }} |"
            echo ""
            echo "**Public assets (/public_html/)**"
            echo ""
            echo "| Metrik | Jumlah |"
            echo "|---|---|"
            echo "| File diunggah | ${{ steps.ftp_deploy_public.outputs.total-files-uploaded }} |"
            echo "| File dihapus | ${{ steps.ftp_deploy_public.outputs.total-files-deleted }} |"
            echo "| File dilewati (tidak berubah) | ${{ steps.ftp_deploy_public.outputs.total-files-skipped }} |"
          } >> "$GITHUB_STEP_SUMMARY"
