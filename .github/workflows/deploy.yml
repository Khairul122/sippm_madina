name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite, gd, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run test suite
        run: php artisan test

  deploy:
    name: Deploy via SSH
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy start summary
        run: |
          {
            echo "### 🚀 Deploy dimulai"
            echo ""
            echo "| Info | Nilai |"
            echo "|---|---|"
            echo "| Commit | \`${GITHUB_SHA:0:7}\` — $(git log -1 --pretty=%s) |"
            echo "| Branch | \`${GITHUB_REF_NAME}\` |"
            echo "| Trigger oleh | ${GITHUB_ACTOR} |"
            echo "| Waktu (UTC) | $(date -u '+%Y-%m-%d %H:%M:%S') |"
            echo "| Target server | \`${{ secrets.SSH_HOST }}:${{ secrets.SSH_PORT }}\` |"
            echo "| Target folder | \`${{ secrets.SSH_REMOTE_PATH }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to server via rsync over SSH
        id: rsync_deploy
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.git*' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.github' \
            --exclude='vendor' \
            --exclude='storage/framework/cache' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/views' \
            --exclude='storage/logs' \
            --exclude='.env' \
            ./ "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_REMOTE_PATH }}/"

      - name: Install Composer dependencies on server via SSH
        if: steps.rsync_deploy.outcome == 'success'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.SSH_REMOTE_PATH }}
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Deploy result summary
        if: always()
        run: |
          {
            echo ""
            echo "### 📦 Hasil deploy"
            echo ""
            if [ "${{ steps.rsync_deploy.outcome }}" = "success" ]; then
              echo "✅ Berhasil di-deploy ke \`${{ secrets.SSH_HOST }}:${{ secrets.SSH_REMOTE_PATH }}\`"
            else
              echo "❌ Deploy gagal — cek log step \"Deploy to server via rsync over SSH\" di atas untuk detail error."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
