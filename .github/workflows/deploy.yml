name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite, gd, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run test suite
        run: php artisan test

  deploy:
    name: Deploy via FTP
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite, gd, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install Composer dependencies (production)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Prepare public folder for hosting without a configurable document root
        run: |
          mkdir -p dist_public
          cp -r public/. dist_public/
          sed -i "s#__DIR__.'/../storage/framework/maintenance.php'#__DIR__.'/../laravel_app/storage/framework/maintenance.php'#" dist_public/index.php
          sed -i "s#__DIR__.'/../vendor/autoload.php'#__DIR__.'/../laravel_app/vendor/autoload.php'#" dist_public/index.php
          sed -i "s#__DIR__.'/../bootstrap/app.php'#__DIR__.'/../laravel_app/bootstrap/app.php'#" dist_public/index.php

      - name: Deploy start summary
        run: |
          {
            echo "### 🚀 Deploy dimulai"
            echo ""
            echo "| Info | Nilai |"
            echo "|---|---|"
            echo "| Commit | \`${GITHUB_SHA:0:7}\` — $(git log -1 --pretty=%s) |"
            echo "| Branch | \`${GITHUB_REF_NAME}\` |"
            echo "| Trigger oleh | ${GITHUB_ACTOR} |"
            echo "| Waktu (UTC) | $(date -u '+%Y-%m-%d %H:%M:%S') |"
            echo "| Target server | \`${{ secrets.FTP_SERVER }}:21\` |"
            echo "| Target folder (publik) | \`${{ secrets.FTP_SERVER_DIR }}\` |"
            echo "| Target folder (app inti) | \`/laravel_app/\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy app core (outside public_html) via FTP
        id: ftp_deploy_core
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          server-dir: /laravel_app/
          log-level: verbose
          state-name: .ftp-deploy-sync-state-core.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.github/**
            **/public/**
            **/dist_public/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/logs/**
            **/.env

      - name: Deploy public assets (into public_html) via FTP
        id: ftp_deploy_public
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: dist_public/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          log-level: verbose
          state-name: .ftp-deploy-sync-state-public.json

      - name: Deploy result summary
        if: always()
        run: |
          {
            echo ""
            echo "### 📦 Hasil deploy"
            echo ""
            if [ "${{ steps.ftp_deploy_core.outcome }}" = "success" ] && [ "${{ steps.ftp_deploy_public.outcome }}" = "success" ]; then
              echo "✅ Berhasil di-deploy ke \`${{ secrets.FTP_SERVER }}\`"
            else
              echo "❌ Deploy gagal — cek log step \"Deploy app core\"/\"Deploy public assets\" di atas untuk detail error FTP."
            fi
            echo ""
            echo "**App core (/laravel_app/)**"
            echo ""
            echo "| Metrik | Jumlah |"
            echo "|---|---|"
            echo "| File diunggah | ${{ steps.ftp_deploy_core.outputs.total-files-uploaded }} |"
            echo "| File dihapus | ${{ steps.ftp_deploy_core.outputs.total-files-deleted }} |"
            echo "| File dilewati (tidak berubah) | ${{ steps.ftp_deploy_core.outputs.total-files-skipped }} |"
            echo ""
            echo "**Public assets (${{ secrets.FTP_SERVER_DIR }})**"
            echo ""
            echo "| Metrik | Jumlah |"
            echo "|---|---|"
            echo "| File diunggah | ${{ steps.ftp_deploy_public.outputs.total-files-uploaded }} |"
            echo "| File dihapus | ${{ steps.ftp_deploy_public.outputs.total-files-deleted }} |"
            echo "| File dilewati (tidak berubah) | ${{ steps.ftp_deploy_public.outputs.total-files-skipped }} |"
          } >> "$GITHUB_STEP_SUMMARY"
